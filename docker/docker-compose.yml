version: "3.9"

services:

  # ─────────────────────────── PostgreSQL ───────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: badminton-postgres
    environment:
      POSTGRES_DB: badminton_db
      POSTGRES_USER: badminton_user
      POSTGRES_PASSWORD: badminton_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U badminton_user -d badminton_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────── Zookeeper ────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: badminton-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────── Kafka ────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: badminton-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 6

  # ─────────────────────────── Video Service ────────────────────────
  video-service:
    build:
      context: ../backend-video-service
      dockerfile: Dockerfile
    container_name: badminton-video-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/badminton_db
      SPRING_DATASOURCE_USERNAME: badminton_user
      SPRING_DATASOURCE_PASSWORD: badminton_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_VIDEO_STORAGE_PATH: /app/storage/videos
    volumes:
      - video_storage:/app/storage/videos
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/api/videos/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────── Feedback Service ─────────────────────
  feedback-service:
    build:
      context: ../backend-feedback-service
      dockerfile: Dockerfile
    container_name: badminton-feedback-service
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/badminton_db
      SPRING_DATASOURCE_USERNAME: badminton_user
      SPRING_DATASOURCE_PASSWORD: badminton_pass
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/api/analysis/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────── AI Analysis Service ──────────────────
  ai-analysis-service:
    build:
      context: ../ai-analysis-service
      dockerfile: Dockerfile
    container_name: badminton-ai-service
    depends_on:
      kafka:
        condition: service_healthy
      feedback-service:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_VIDEO_UPLOADED: video-uploaded
      KAFKA_GROUP_ID: ai-analysis-group
      FEEDBACK_SERVICE_URL: http://feedback-service:8082
      VIDEO_SERVICE_URL: http://video-service:8081
      VIDEO_STORAGE_PATH: /app/storage/videos
    volumes:
      - video_storage:/app/storage/videos

  # ─────────────────────────── Angular Frontend ─────────────────────
  frontend:
    build:
      context: ../frontend-angular
      dockerfile: Dockerfile
    container_name: badminton-frontend
    ports:
      - "4200:80"
    depends_on:
      - video-service
      - feedback-service

volumes:
  postgres_data:
  video_storage:
