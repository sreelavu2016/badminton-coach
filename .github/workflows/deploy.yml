name: Build & Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_RG: rg-badminton-coach
  AZURE_LOCATION: australiaeast
  APP_NAME: badmintoncoach
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ── 1. Provision Azure infrastructure ──────────────────────────────────────
  infra:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    outputs:
      acr_server: ${{ steps.bicep.outputs.acrLoginServer }}
      video_svc_url: ${{ steps.bicep.outputs.videoServiceUrl }}
      frontend_url: ${{ steps.bicep.outputs.frontendUrl }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create resource group
        run: |
          az group create \
            --name $AZURE_RG \
            --location $AZURE_LOCATION

      - name: Deploy Bicep
        id: bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.AZURE_RG }}
          template: azure/bicep/main.bicep
          parameters: >
            appName=${{ env.APP_NAME }}
            environment=prod
            postgresAdminPassword=${{ secrets.POSTGRES_ADMIN_PASSWORD }}
            imageTag=${{ env.IMAGE_TAG }}
          failOnStdErr: false

  # ── 2. Build & push Docker images to ACR ───────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: infra
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: az acr login --name ${{ needs.infra.outputs.acr_server }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push video-service
        uses: docker/build-push-action@v5
        with:
          context: backend-video-service
          push: true
          tags: ${{ needs.infra.outputs.acr_server }}/video-service:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push feedback-service
        uses: docker/build-push-action@v5
        with:
          context: backend-feedback-service
          push: true
          tags: ${{ needs.infra.outputs.acr_server }}/feedback-service:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push ai-analysis-service
        uses: docker/build-push-action@v5
        with:
          context: ai-analysis-service
          push: true
          tags: ${{ needs.infra.outputs.acr_server }}/ai-analysis-service:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Build & deploy Angular frontend to Static Web App ───────────────────
  frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [infra, build]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-angular/package-lock.json

      - name: Substitute API URLs in environment.prod.ts
        working-directory: frontend-angular
        run: |
          VIDEO_URL="${{ needs.infra.outputs.video_svc_url }}"
          # Strip trailing slash if present
          VIDEO_URL="${VIDEO_URL%/}"
          # Feedback service is internal; frontend calls via video svc FQDN on /api/analysis
          # (Azure Container Apps internal DNS: <app-name>.internal.<env-name>.azurecontainerapps.io)
          # For external calls, we use the video service URL host with /api/analysis proxied.
          # Simplest: expose feedback service URL via Bicep output or use the same host.
          # For this deployment the frontend calls each service directly.
          ANALYSIS_URL="${VIDEO_URL/video-svc/feedback-svc}"
          sed -i "s|__VIDEO_API_URL__|${VIDEO_URL}|g" src/environments/environment.prod.ts
          sed -i "s|__ANALYSIS_API_URL__|${ANALYSIS_URL}|g" src/environments/environment.prod.ts

      - name: Install dependencies
        working-directory: frontend-angular
        run: npm ci

      - name: Build Angular (production)
        working-directory: frontend-angular
        run: npm run build:prod

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APP_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend-angular
          output_location: dist/badminton-coach-frontend/browser
          skip_app_build: true
